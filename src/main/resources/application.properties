# Server Configuration
server.port=9090
server.servlet.context-path=/StudentEventBooking

# Application Name
spring.application.name=StudentEventBooking

# Firebase Configuration
firebase.project.id=${FIREBASE_PROJECT_ID:studenteventbooking}
firebase.service.account.path=${FIREBASE_SERVICE_ACCOUNT_PATH:./firebase-service-account.json}

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL:false}
spring.data.redis.timeout=2000ms

# no-key APIs
external.api.postcodes.url=${POSTCODES_API_URL:https://api.postcodes.io}
external.api.openmeteo.url=${OPENMETEO_API_URL:https://api.open-meteo.com/v1}
external.api.bankholidays.url=${BANKHOLIDAYS_URL:https://www.gov.uk/bank-holidays.json}
external.api.nominatim.url=${NOMINATIM_URL:https://nominatim.openstreetmap.org}

external.api.weather.key=${WEATHER_API_KEY:}
external.api.weather.url=${WEATHER_API_URL:https://api.openweathermap.org/data/2.5}
external.api.skiddle.key=${SKIDDLE_API_KEY:}
external.api.skiddle.url=${SKIDDLE_API_URL:https://www.skiddle.com/api/v1}
external.api.google.maps.key=${GOOGLE_MAPS_API_KEY:}

# Logging
logging.level.com.student.eventbooking=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.google.firebase=INFO